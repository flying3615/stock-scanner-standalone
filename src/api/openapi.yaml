    CreditSpreadStrategyType:
      type: string
      description: Strategy playbook identifier for the candidate or template.
      enum: [BEAR_CALL_CREDIT, BULL_PUT_CREDIT]

    CreditSpreadDirection:
      type: string
      description: Normalized directional thesis. Do not infer this from the option leg type alone.
      enum: [BEARISH, BULLISH]

    CreditSpreadAnchorType:
      type: string
      description: |
        Structural anchor category used to position the short strike outside price structure.
        `RESISTANCE` means the short leg should sit at or above overhead resistance.
        `SUPPORT` means the short leg should sit at or below support.
      enum: [RESISTANCE, SUPPORT]

    CreditSpreadSetupState:
      type: string
      description: |
        Execution readiness, not recommendation strength. `ACTIONABLE` means the setup passed
        structure, macro, and template gates. `WATCHLIST` means it is still blocked.
      enum: [ACTIONABLE, WATCHLIST]

    CreditSpreadOptionType:
      type: string
      description: Option contract side used by the spread leg.
      enum: [CALL, PUT]

    CreditSpreadBlocker:
      type: string
      description: Machine-readable blocker code explaining why a candidate remains watchlist-only.
      enum:
        - MOVE_DIRECTION_CONFLICT
        - BREAKDOWN_TOO_WEAK
        - BOUNCE_NOT_CONFIRMED
        - MACRO_NOT_ALIGNED
        - NO_LIQUID_TEMPLATE
        - CREDIT_TOO_THIN
        - SUPPORT_ALREADY_LOST
        - RESISTANCE_ALREADY_RECLAIMED

    CreditSpreadTemplate:
      type: object
      description: |
        Suggested 3-7 DTE vertical credit spread template. This is a structured setup proposal,
        not an execution command. `creditPctWidth` is defined as `creditMid / width`.
      properties:
        strategyType:
          $ref: '#/components/schemas/CreditSpreadStrategyType'
        shortLegType:
          allOf:
            - $ref: '#/components/schemas/CreditSpreadOptionType'
          description: Option type of the short leg. Bear call uses CALL. Bull put uses PUT.
        longLegType:
          allOf:
            - $ref: '#/components/schemas/CreditSpreadOptionType'
          description: Option type of the long hedge leg. Matches the short leg for vertical spreads.
        expiryISO:
          type: string
          format: date
          description: Exact expiration date associated with this spread template.
          example: '2026-03-20'
        shortStrike:
          type: number
          format: float
          example: 230
        longStrike:
          type: number
          format: float
          example: 235
        width:
          type: number
          format: float
          example: 5
        dte:
          type: integer
          description: Days to expiration for the selected expiryISO.
          example: 5
        shortDelta:
          type: number
          format: float
          description: Absolute delta of the short leg, used for template selection.
          example: 0.16
        shortBid:
          type: number
          format: float
          example: 1.9
        shortAsk:
          type: number
          format: float
          example: 2.2
        longBid:
          type: number
          format: float
          example: 0.45
        longAsk:
          type: number
          format: float
          example: 0.65
        shortMid:
          type: number
          format: float
          example: 2.05
        longMid:
          type: number
          format: float
          example: 0.55
        creditMid:
          type: number
          format: float
          description: Estimated net credit using mid prices for the short and long legs.
          example: 1.5
        creditPctWidth:
          type: number
          format: float
          description: Net credit divided by spread width (`creditMid / width`). This is not annualized yield.
          example: 0.3
        takeProfitAt:
          type: number
          format: float
          description: Suggested debit value where the seller may take profits, derived from a credit multiple rule.
          example: 0.6
        stopLossAt:
          type: number
          format: float
          description: Suggested debit value where the seller may stop out, derived from a credit multiple rule.
          example: 3.0

    CreditSpreadCandidate:
      type: object
      description: |
        Ranked directional credit spread candidate. `score` is a ranking heuristic used to order candidates,
        not a win rate or probability of profit.
      properties:
        strategyType:
          $ref: '#/components/schemas/CreditSpreadStrategyType'
        direction:
          $ref: '#/components/schemas/CreditSpreadDirection'
        symbol:
          type: string
          example: TSLA
        name:
          type: string
          example: Tesla
        price:
          type: number
          format: float
          example: 212
        changePercent:
          type: number
          format: float
          example: -8.1
        volume:
          type: integer
          example: 120000000
        score:
          type: number
          format: float
          description: Internal ranking score for ordering candidates. Higher is better within the same strategyType.
          example: 35
        setupState:
          $ref: '#/components/schemas/CreditSpreadSetupState'
        structureScore:
          type: number
          format: float
          description: Strategy-specific chart-structure score. Bear call uses breakdown logic; bull put uses support-hold logic.
          example: 28
        macroScore:
          type: number
          format: float
          description: Macro alignment contribution. Positive supports the strategy, negative works against it.
          example: 6
        valueBias:
          type: number
          format: float
          description: Optional valuation bias contribution used as a secondary ranking input.
          example: 2
        anchorType:
          $ref: '#/components/schemas/CreditSpreadAnchorType'
        anchorLevel:
          type: number
          format: float
          description: |
            Structural anchor used to position the short strike outside price structure.
            This is not an entry price. Bear call treats it as resistance; bull put treats it as support.
          example: 226
        invalidationPrice:
          type: number
          format: float
          description: |
            Thesis-break price. If spot price reclaims or loses this buffered level, the setup thesis is considered invalid.
            It is typically near anchorLevel but not necessarily equal to it.
          example: 228.26
        volumeRatio20:
          type: number
          format: float
          example: 2.31
        closeLocationValue:
          type: number
          format: float
          description: Close location inside the daily range, normalized to 0-1.
          example: 0.09
        upperWickRatio:
          type: number
          format: float
          description: Upper wick size normalized by the full daily range.
          example: 0.09
        lowerWickRatio:
          type: number
          format: float
          description: Lower wick size normalized by the full daily range.
          example: 0.09
        eventTags:
          type: array
          items:
            type: string
          description: Raw event labels carried through from upstream data or heuristics.
        thesis:
          type: array
          items:
            type: string
          description: Human-readable rationale points summarizing why the candidate ranks.
        blockers:
          type: array
          description: Machine-readable blocker codes. Empty means the setup is actionable.
          items:
            $ref: '#/components/schemas/CreditSpreadBlocker'
        watchlistReasons:
          type: array
          items:
            type: string
          description: Human-readable explanation of the blocker set for UI display.
        dte:
          type: integer
          nullable: true
          description: Selected days to expiration window used for template construction.
          example: 5
        sector:
          type: string
          nullable: true
          example: Consumer Cyclical
        industry:
          type: string
          nullable: true
          example: Auto Manufacturers
        spreadTemplate:
          allOf:
            - $ref: '#/components/schemas/CreditSpreadTemplate'
          nullable: true
          description: Null when no liquid template survives anchor, delta, or liquidity gates.

    CreditSpreadStrategyFilters:
      type: object
      properties:
        minPrice:
          type: number
          format: float
          example: 20
        maxPrice:
          type: number
          format: float
          example: 500
        minVolume:
          type: integer
          example: 20000000
        targetDteMin:
          type: integer
          example: 3
        targetDteMax:
          type: integer
          example: 7

    CreditSpreadStrategySnapshot:
      type: object
      description: Ranked directional credit spread strategy payload.
      properties:
        generatedAt:
          type: string
          format: date-time
          example: '2026-03-12T08:10:00.000Z'
        strategyType:
          $ref: '#/components/schemas/CreditSpreadStrategyType'
        macro:
          allOf:
            - $ref: '#/components/schemas/MacroSnapshot'
          nullable: true
        filters:
          $ref: '#/components/schemas/CreditSpreadStrategyFilters'
        candidates:
          type: array
          items:
            $ref: '#/components/schemas/CreditSpreadCandidate'

    NewsItem:
      type: object
      description: Normalized FinancialJuice news item
      properties:
        id:
          type: string
          example: '921381'
        timestamp:
          type: string
          format: date-time
          example: '2026-02-09T13:05:12.000Z'
        headline:
          type: string
          example: Fed official says inflation progress remains uneven
        category:
          type: string
          example: Economy
        urgency:
          type: integer
          minimum: 1
          maximum: 5
          example: 3
        source:
          type: string
          example: FinancialJuice

    NewsListResponse:
      type: object
      description: FinancialJuice list response for category news
      properties:
        category:
          type: string
          enum: [macro, indices, equities, crypto]
          example: macro
        cached:
          type: boolean
          example: true
        stale:
          type: boolean
          description: Indicates stale cache fallback when fetch fails
          example: false
        fetchedAt:
          type: integer
          format: int64
          description: Cache fetch timestamp in milliseconds
          example: 1739109600000
        count:
          type: integer
          example: 20
        items:
          type: array
          items:
            $ref: '#/components/schemas/NewsItem'

    NewsSearchResponse:
      type: object
      description: FinancialJuice ticker search response
      properties:
        symbol:
          type: string
          example: AAPL
        count:
          type: integer
          example: 3
        items:
          type: array
          items:
            $ref: '#/components/schemas/NewsItem'

    NewsTokenSetRequest:
      type: object
      required:
        - token
      properties:
        token:
          type: string
          description: FinancialJuice info token
          example: REDACTED_FINANCIALJUICE_TOKEN
        softTtlMinutes:
          type: integer
          minimum: 1
          description: Soft expiration duration in minutes
          example: 8640
        hardTtlMinutes:
          type: integer
          minimum: 1
          description: Hard expiration duration in minutes
          example: 10080

    NewsTokenStatus:
      type: object
      description: Runtime status of FinancialJuice token
      properties:
        configured:
          type: boolean
          example: true
        hasToken:
          type: boolean
          example: true
        obtainedAt:
          type: integer
          format: int64
          nullable: true
          example: 1739109600000
        softExpireAt:
          type: integer
          format: int64
          nullable: true
          example: 1739628000000
        hardExpireAt:
          type: integer
          format: int64
          nullable: true
          example: 1739714400000
        refreshFailures:
          type: integer
          example: 0
        lastRefreshReason:
          type: string
          nullable: true
          example: forced
        refreshedBy:
          type: string
          nullable: true
          example: manual-api
        msToSoftExpire:
          type: integer
          format: int64
          nullable: true
          example: 3600000
        msToHardExpire:
          type: integer
          format: int64
          nullable: true
          example: 7200000
        likelyExpired:
          type: boolean
          example: false

    NewsTokenClearResponse:
      type: object
      description: Response after clearing saved FinancialJuice token
      properties:
        cleared:
          type: boolean
          example: true

    Error:
      type: object
      description: Error response
      properties:
        error:
          type: string
          description: Error message
          example: Failed to fetch movers
        code:
          type: string
          nullable: true
          description: Optional machine-readable error code such as `NO_OPTION_DATA`, `UPSTREAM_TIMEOUT`, or `UPSTREAM_FETCH_FAILED`.
          example: UPSTREAM_FETCH_FAILED
