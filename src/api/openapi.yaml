          format: float
          nullable: true
          description: Normalized reference spot price used to choose the nearby strike window.
          example: 186.03
        asOf:
          type: string
          format: date-time
          description: Server-side snapshot generation time.
          example: '2026-03-12T19:00:00.000Z'
        requested:
          $ref: '#/components/schemas/NearbyOptionsChainRequest'
        summary:
          $ref: '#/components/schemas/NearbyOptionsChainSummary'
        expiries:
          type: array
          items:
            $ref: '#/components/schemas/NearbyOptionsExpiryBucket'

    NearbyOptionsChainRequest:
      type: object
      properties:
        dteMin:
          type: integer
          example: 3
        dteMax:
          type: integer
          example: 7
        strikesEachSide:
          type: integer
          example: 10

    NearbyOptionsChainSummary:
      type: object
      properties:
        selectedExpiryCount:
          type: integer
          example: 1
        availableExpiries:
          type: array
          items:
            type: string
            format: date
          example:
            - '2026-03-16'
        atmStrike:
          type: number
          format: float
          nullable: true
          example: 185
        strikeWindow:
          $ref: '#/components/schemas/NearbyOptionsStrikeWindow'
        selectionMode:
          $ref: '#/components/schemas/NearbyOptionsSelectionMode'
        effectiveDteRange:
          $ref: '#/components/schemas/NearbyOptionsEffectiveDteRange'
        expansionReasonCode:
          allOf:
            - $ref: '#/components/schemas/NearbyOptionsExpansionReasonCode'
          nullable: true
          description: |
            Present when `selectionMode = EXPANDED`. `NEXT_AVAILABLE_EXPIRY` means the server
            moved to the nearest later expiry because the requested window was empty.
            `PREVIOUS_AVAILABLE_EXPIRY` means no later expiry existed, so the closest shorter-dated
            expiry was used instead.
          example: NEXT_AVAILABLE_EXPIRY
        emptyReasonCode:
          allOf:
            - $ref: '#/components/schemas/NearbyOptionsEmptyReasonCode'
          nullable: true
          description: |
            Present only when no usable expiry bucket can be returned. `NO_OPTION_DATA` means the
            upstream source exposed no option expiries for this symbol. `NO_EXPIRIES_IN_RANGE`
            is retained for compatibility when the requested range was empty and no expanded
            fallback could be loaded.
          example: NO_OPTION_DATA

    NearbyOptionsEmptyReasonCode:
      type: string
      enum: [NO_EXPIRIES_IN_RANGE, NO_OPTION_DATA]

    NearbyOptionsSelectionMode:
      type: string
      enum: [STRICT, EXPANDED]

    NearbyOptionsExpansionReasonCode:
      type: string
      enum: [NEXT_AVAILABLE_EXPIRY, PREVIOUS_AVAILABLE_EXPIRY]

