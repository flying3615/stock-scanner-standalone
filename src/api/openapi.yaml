        ask:
          type: number
          format: float
          nullable: true
          example: 6.35
        mid:
          type: number
          format: float
          nullable: true
          description: Derived midpoint estimate built from bid and ask when possible.
          example: 6.25
        last:
          type: number
          format: float
          nullable: true
          example: 6.31
        delta:
          type: number
          format: float
          nullable: true
          description: Signed option delta. Uses vendor greeks when available and falls back to a heuristic estimate when the upstream chain omits delta.
          example: 0.52
        impliedVolatility:
          type: number
          format: float
          nullable: true
          example: 0.47
        openInterest:
          type: integer
          nullable: true
          example: 8421
        volume:
          type: integer
          nullable: true
          example: 1912
        inTheMoney:
          type: boolean
          nullable: true
          example: true
        lastTradeDate:
          type: string
          format: date-time
          nullable: true
          example: '2026-03-12T18:58:14.000Z'

