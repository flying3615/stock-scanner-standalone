openapi: 3.0.3
info:
  title: Stock Scanner API
  description: |
    Real-time stock market analysis API providing market movers, value analysis, options scanning,
    historical data, sector trends, and macro indicators.

    **Caching Behavior:**
    - Market movers: 5 minutes
    - Value analysis: 30 minutes
    - Options data: 1 minute (real-time sensitive)
    - History, sectors, macro: No cache
  version: 1.0.0
  contact:
    name: Stock Scanner API
servers:
  - url: /
    description: Current origin (recommended)
  - url: http://localhost:3000
    description: Local development server

tags:
  - name: Market Data
    description: Real-time market movers and stock data
  - name: Analysis
    description: Value and options analysis endpoints
  - name: Analytics
    description: Sector trends and macro indicators
  - name: Strategies
    description: Ranked strategy setups derived from scanner, options, and macro inputs
  - name: History
    description: Historical scan results
  - name: News
    description: FinancialJuice news retrieval and token management

paths:
  /api/movers:
    get:
      tags:
        - Market Data
      summary: Get market movers
      description: |
        Fetches top gaining, losing, or most active stocks with enriched value metrics and money flow data.
        Results are cached for 5 minutes to reduce API load.
      operationId: getMarketMovers
      parameters:
        - name: type
          in: query
          description: Type of market movers to fetch
          required: false
          schema:
            type: string
            enum: [gainers, losers, active]
            default: active
        - name: limit
          in: query
          description: Number of stocks to return
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Successful response with enriched market movers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EnrichedMover'
              example:
                - symbol: AAPL
                  name: Apple Inc.
                  price: 185.50
                  change: 5.25
                  changesPercentage: 2.91
                  volume: 58234567
                  valueScore: 75.3
                  valueMetrics:
                    peRatio: 29.5
                    pbRatio: 45.2
                    debtToEquity: 1.73
                    roe: 0.456
                    currentRatio: 0.98
                  moneyFlowStrength: 68.5
                  sector: Technology
                  industry: Consumer Electronics
                  reasons:
                    - Strong revenue growth
                    - High profitability
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/value/{symbol}:
    get:
      tags:
        - Analysis
      summary: Analyze stock value
      description: |
        Performs comprehensive value analysis on a stock symbol including fundamentals,
        ratios, and scoring. Results are cached for 30 minutes.
      operationId: getValueAnalysis
      parameters:
        - name: symbol
          in: path
          description: Stock ticker symbol (uppercase)
          required: true
          schema:
            type: string
            pattern: '^[A-Z]{1,5}$'
            example: AAPL
      responses:
        '200':
          description: Value analysis result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValueScore'
              example:
                symbol: AAPL
                score: 75.3
                sector: Technology
                industry: Consumer Electronics
                metrics:
                  peRatio: 29.5
                  pbRatio: 45.2
                  debtToEquity: 1.73
                  roe: 0.456
                  currentRatio: 0.98
                reasons:
                  - Strong revenue growth
                  - High profitability
                  - Excellent return on equity
        '404':
          description: Stock data not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Analysis failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/options/{symbol}:
    get:
      tags:
        - Analysis
      summary: Scan options activity
      description: |
        Scans options flow for a symbol, detecting unusual activity, sentiment, and signals.
        Results are cached for 1 minute due to real-time sensitivity. Automatically saves
        results to historical database.
      operationId: scanOptions
      parameters:
        - name: symbol
          in: path
          description: Stock ticker symbol (uppercase)
          required: true
          schema:
            type: string
            pattern: '^[A-Z]{1,5}$'
            example: AAPL
      responses:
        '200':
          description: Options scan result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OptionsScanResult'
              example:
                moneyFlowStrength: 68.5
                signals:
                  - symbol: AAPL
                    type: call
                    strike: 190
                    expiryISO: '2024-03-15T00:00:00Z'
                    volume: 5234
                    openInterest: 12456
                    last: 8.50
                    bid: 8.45
                    ask: 8.55
                    mid: 8.50
                    notional: 44489000
                    pos: 0.85
                    direction: buy
                    lastTradeISO: '2024-03-01T15:30:00Z'
                    ageMin: 5
                    rmp: 185.50
                    moneyness: 1.024
                    daysToExpiry: 14
                    marketCap: 2850000000000
                    notionalToMarketCap: 0.0000156
                    isDeepOTMPut: false
                    tenorBucket: short
                    isShortTermSpec: true
                    isLongTermHedge: false
                    comboId: ''
                    comboType: standalone
                    isComboHedge: false
                    isLargeOTMCall: false
                    hedgeScore: 0.12
                    hedgeTags: []
                    iv: 0.28
                    spreadPct: 0.59
                    traderType: institutional
                    spotConfirmation: strong
                    daysToEarnings: null
                    directionConfidence: 0.89
                    signalQuality: 0.85
                sentiment:
                  bullishNotional: 145000000
                  bearishNotional: 78000000
                  putCallRatio: 0.54
                  sentiment: 0.67
                marketState: regular
                rmp: 185.50
        '500':
          description: Options scan failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/options-chain/nearby/{symbol}:
    get:
      tags:
        - Market Data
      summary: Get normalized nearby options chain
      description: |
        Returns a compact, strategy-oriented options chain snapshot grouped by expiry.
        The payload is normalized for machine readers: expiries are limited to a `dteMin`/`dteMax`
        window, strikes are trimmed around spot, and calls/puts share one field vocabulary.

        `asOf` is the server-side snapshot generation time, not necessarily the timestamp of the last trade.
        `mid` is a derived midpoint estimate, not an executable guarantee.
        If the requested DTE window is empty, the route automatically expands to the nearest available
        expiry, preferring the next later expiry over a shorter-dated fallback. Inspect
        `summary.selectionMode`, `summary.effectiveDteRange`, and `summary.expansionReasonCode`
        to see whether expansion occurred.
      operationId: getNearbyOptionsChainSnapshot
      parameters:
        - name: symbol
          in: path
          required: true
          description: Underlying symbol to inspect.
          schema:
            type: string
            minLength: 1
            example: NVDA
        - name: dteMin
          in: query
          required: false
          description: Minimum days-to-expiration to include in the snapshot.
          schema:
            type: integer
            minimum: 1
            maximum: 60
            default: 3
        - name: dteMax
          in: query
          required: false
          description: Maximum days-to-expiration to include in the snapshot.
          schema:
            type: integer
            minimum: 1
            maximum: 60
            default: 7
        - name: strikesEachSide
          in: query
          required: false
          description: Number of strikes to retain above and below spot for each selected expiry.
          schema:
            type: integer
            minimum: 1
            maximum: 25
            default: 10
      responses:
        '200':
          description: Normalized nearby options chain grouped by expiry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NearbyOptionsChainSnapshot'
              example:
                symbol: NVDA
                spot: 186.03
                asOf: '2026-03-12T19:00:00.000Z'
                requested:
                  dteMin: 3
                  dteMax: 7
                  strikesEachSide: 10
                summary:
                  selectedExpiryCount: 1
                  availableExpiries:
                    - '2026-03-16'
                  atmStrike: 185
                  strikeWindow:
                    belowSpot: 10
                    aboveSpot: 10
                  selectionMode: STRICT
                  effectiveDteRange:
                    dteMin: 4
                    dteMax: 4
                  expansionReasonCode: null
                  emptyReasonCode: null
                expiries:
                  - expiryISO: '2026-03-16'
                    dte: 4
                    atmStrike: 185
                    calls:
                      - contractSymbol: NVDA260316C00185000
                        strike: 185
                        bid: 6.15
                        ask: 6.35
                        mid: 6.25
                        last: 6.31
                        delta: 0.52
                        impliedVolatility: 0.47
                        openInterest: 8421
                        volume: 1912
                        inTheMoney: true
                        lastTradeDate: '2026-03-12T18:58:14.000Z'
                    puts:
                      - contractSymbol: NVDA260316P00185000
                        strike: 185
                        bid: 5.85
                        ask: 6.05
                        mid: 5.95
                        last: 6.01
                        delta: -0.48
                        impliedVolatility: 0.46
                        openInterest: 7310
                        volume: 1654
                        inTheMoney: false
                        lastTradeDate: '2026-03-12T18:58:10.000Z'
        '400':
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: No option data exists for the requested symbol
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Failed to load nearby options chain snapshot from the upstream data source
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/charts/{symbol}/d1:
    get:
      tags:
        - Market Data
      summary: Get normalized daily chart snapshot
      description: |
        Returns recent `1d` OHLCV bars plus the structure indicators already used by the
        directional credit spread engine. The response returns only the trailing `lookback`
        bars, but EMA calculations may use a longer internal history so `ema200` stays stable.

        `support` and `resistance` are structural reference levels for downstream reasoning,
        not trade commands or guaranteed reaction levels.
      operationId: getDailyChartSnapshot
      parameters:
        - name: symbol
          in: path
          required: true
          description: Underlying symbol to inspect.
          schema:
            type: string
            minLength: 1
            example: NVDA
        - name: lookback
          in: query
          required: false
          description: Number of trailing daily bars returned to the caller.
          schema:
            type: integer
            minimum: 1
            maximum: 365
            default: 120
      responses:
        '200':
          description: Normalized daily chart snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DailyChartSnapshot'
              example:
                symbol: NVDA
                interval: 1d
                asOf: '2026-03-12T19:00:00.000Z'
                requested:
                  lookback: 120
                summary:
                  latestClose: 186.03
                  periodHigh: 195.22
                  periodLow: 160.1
                  percentChange: 5.8
                  averageVolume20: 114000000
                indicators:
                  ema20: 182.2
                  ema50: 176.4
                  ema200: 149.6
                  volumeRatio20: 1.42
                  closeLocationValue: 0.34
                  upperWickRatio: 0.28
                  lowerWickRatio: 0.16
                  support: 176.4
                  resistance: 191.8
                bars:
                  - date: '2026-03-10T00:00:00.000Z'
                    open: 181.5
                    high: 185.8
                    low: 180.7
                    close: 184.55
                    volume: 119400000
                  - date: '2026-03-11T00:00:00.000Z'
                    open: 184.8
                    high: 187.1
                    low: 183.4
                    close: 185.42
                    volume: 111700000
                  - date: '2026-03-12T00:00:00.000Z'
                    open: 184.1
                    high: 188.4
                    low: 183.2
                    close: 186.03
                    volume: 138700000
        '400':
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: No daily chart data found for the requested symbol
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Failed to load daily chart snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/history/{symbol}:
    get:
      tags:
        - History
      summary: Get historical scan results
      description: |
        Retrieves historical options scan results for a symbol. No caching applied.
      operationId: getHistory
      parameters:
        - name: symbol
          in: path
          description: Stock ticker symbol (uppercase)
          required: true
          schema:
            type: string
            pattern: '^[A-Z]{1,5}$'
            example: AAPL
      responses:
        '200':
          description: Historical scan records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HistoryRecord'
              example:
                - timestamp: '2024-03-01T15:30:00Z'
                  symbol: AAPL
                  sentiment:
                    bullishNotional: 145000000
                    bearishNotional: 78000000
                    putCallRatio: 0.54
                    sentiment: 0.67
                  signalCount: 12
                  topSignals:
                    - type: call
                      strike: 190
                      notional: 44489000
                      direction: buy
        '500':
          description: Failed to fetch history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/trends/sectors:
    get:
      tags:
        - Analytics
      summary: Get sector trends
      description: |
        Analyzes sector performance trends over the past 14 days. No caching applied.
      operationId: getSectorTrends
      responses:
        '200':
          description: Sector trend analysis
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SectorTrend'
              example:
                - sector: Technology
                  avgChange: 2.45
                  stockCount: 87
                  momentum: strong
                  topGainers:
                    - NVDA
                    - AAPL
                    - MSFT
                - sector: Healthcare
                  avgChange: -0.52
                  stockCount: 65
                  momentum: weak
                  topGainers:
                    - JNJ
                    - PFE
        '500':
          description: Failed to fetch sector trends
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/macro:
    get:
      tags:
        - Analytics
      summary: Get macro snapshot
      description: |
        Retrieves current macro market indicators including indices, DXY, VIX, and regime.
      operationId: getMacroSnapshot
      responses:
        '200':
          description: Macro market snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MacroSnapshot'
              example:
                indices:
                  - symbol: ^GSPC
                    name: S&P 500
                    price: 5234.18
                    change: 45.23
                    changePercent: 0.87
                  - symbol: ^DJI
                    name: Dow Jones
                    price: 38456.78
                    change: 125.67
                    changePercent: 0.33
                  - symbol: ^IXIC
                    name: NASDAQ
                    price: 16234.56
                    change: 98.45
                    changePercent: 0.61
                dxy:
                  price: 103.45
                  change: 0.12
                  changePercent: 0.12
                vix:
                  price: 14.56
                  change: -0.45
                  changePercent: -3.00
                overallRegime: bullish
        '500':
          description: Failed to fetch macro snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/news:
    get:
      tags:
        - News
      summary: Get FinancialJuice news
      description: |
        Returns latest FinancialJuice news by category with optional cache bypass.
        When request fails but cache exists, stale cache may be returned.
      operationId: getFinancialJuiceNews
      parameters:
        - name: category
          in: query
          description: News category
          required: false
          schema:
            type: string
            enum: [macro, indices, equities, crypto]
            default: macro
        - name: limit
          in: query
          description: Maximum items to return
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
        - name: fresh
          in: query
          description: Force fresh fetch and bypass in-memory cache
          required: false
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: News list response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewsListResponse'
              example:
                category: macro
                cached: false
                count: 2
                items:
                  - id: '921381'
                    timestamp: '2026-02-09T13:05:12.000Z'
                    headline: 'Fed official says inflation progress remains uneven'
                    category: 'Economy'
                    urgency: 3
                    source: 'FinancialJuice'
                  - id: '921382'
                    timestamp: '2026-02-09T13:10:45.000Z'
                    headline: 'US treasury yields rise ahead of auction'
                    category: 'Bonds'
                    urgency: 3
                    source: 'FinancialJuice'
        '500':
          description: Failed to load news
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/strategies/credit-spreads:
    get:
      tags:
        - Strategies
      summary: Get ranked directional credit spread candidates
      description: |
        Builds a directional credit spread snapshot by combining market movers,
        daily chart structure, macro regime, and near-term vertical spread templates.
        The schema is written for machine readers: downstream AI clients should use
        `strategyType`, `direction`, `anchorType`, `anchorLevel`, `invalidationPrice`,
        and `blockers` to reason about the setup instead of inferring intent from UI copy.
      operationId: getCreditSpreadStrategySnapshot
      parameters:
        - in: query
          name: strategyType
          required: false
          description: |
            Strategy playbook to rank. `BEAR_CALL_CREDIT` targets bearish resistance-fade setups.
            `BULL_PUT_CREDIT` targets bullish support-hold setups.
          schema:
            type: string
            enum: [BEAR_CALL_CREDIT, BULL_PUT_CREDIT]
            default: BEAR_CALL_CREDIT
        - in: query
          name: setupState
          required: false
          description: |
            Optional server-side execution filter. `ACTIONABLE` means the setup passed
            structure, macro, and spread-template gates. `WATCHLIST` means the setup is
            informative but currently blocked.
          schema:
            type: string
            enum: [ACTIONABLE, WATCHLIST]
        - in: query
          name: limit
          required: false
          description: Maximum number of candidates returned after filtering.
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Ranked credit spread strategy snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreditSpreadStrategySnapshot'
              example:
                generatedAt: '2026-03-12T08:10:00.000Z'
                strategyType: BEAR_CALL_CREDIT
                macro:
                  indices: []
                  dxy:
                    symbol: DX-Y.NYB
                    price: 104.0
                    changePercent: 0.5
                    trend: UP
                  vix:
                    symbol: ^VIX
                    price: 20.0
                    changePercent: 6.0
                    status: RISING
                  overallRegime: RISK_OFF
                filters:
                  minPrice: 20
                  maxPrice: 500
                  minVolume: 20000000
                  targetDteMin: 3
                  targetDteMax: 7
                candidates:
                  - strategyType: BEAR_CALL_CREDIT
                    direction: BEARISH
                    symbol: TSLA
                    name: Tesla
                    price: 212
                    changePercent: -8.1
                    volume: 120000000
                    score: 35
                    setupState: ACTIONABLE
                    structureScore: 28
                    macroScore: 6
                    valueBias: 2
                    anchorType: RESISTANCE
                    anchorLevel: 226
                    invalidationPrice: 228.26
                    volumeRatio20: 2.31
                    closeLocationValue: 0.09
                    upperWickRatio: 0.09
                    lowerWickRatio: 0.09
                    eventTags: []
                    thesis:
                      - Closed below the prior 20-session low
                      - Options chain offers a liquid call credit spread above resistance
                    blockers: []
                    watchlistReasons: []
                    dte: 5
                    spreadTemplate:
                      strategyType: BEAR_CALL_CREDIT
                      shortLegType: CALL
                      longLegType: CALL
                      expiryISO: '2026-03-20'
                      shortStrike: 230
                      longStrike: 235
                      width: 5
                      dte: 5
                      shortDelta: 0.16
                      shortBid: 1.9
                      shortAsk: 2.2
                      longBid: 0.45
                      longAsk: 0.65
                      shortMid: 2.05
                      longMid: 0.55
                      creditMid: 1.5
                      creditPctWidth: 0.3
                      takeProfitAt: 0.6
                      stopLossAt: 3.0
        '500':
          description: Failed to build credit spread strategy snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/strategies/call-credit:
    get:
      tags:
        - Strategies
      summary: Get ranked call credit spread candidates
      deprecated: true
      description: |
        Legacy alias for `/api/strategies/credit-spreads?strategyType=BEAR_CALL_CREDIT`.
        New AI and frontend consumers should prefer the unified `credit-spreads` route.
      operationId: getLegacyCallCreditStrategySnapshot
      responses:
        '200':
          description: Ranked bearish call credit strategy snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreditSpreadStrategySnapshot'
        '500':
          description: Failed to build call credit strategy snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/news/search/{symbol}:
    get:
      tags:
        - News
      summary: Search news by symbol
      description: Searches FinancialJuice ticker news for a specific symbol.
      operationId: searchFinancialJuiceNews
      parameters:
        - name: symbol
          in: path
          description: Stock ticker symbol
          required: true
          schema:
            type: string
            minLength: 1
            example: AAPL
        - name: limit
          in: query
          description: Maximum items to return
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
      responses:
        '200':
          description: Symbol news list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewsSearchResponse'
              example:
                symbol: AAPL
                count: 1
                items:
                  - id: '921390'
                    timestamp: '2026-02-09T13:22:00.000Z'
                    headline: 'Apple supplier outlook beats expectations'
                    category: 'Equities'
                    urgency: 3
                    source: 'FinancialJuice'
        '400':
          description: Missing or invalid symbol
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Failed to search news
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/news/token/status:
    get:
      tags:
        - News
      summary: Get FinancialJuice token status
      description: Returns whether a token exists and its expiration metadata.
      operationId: getFinancialJuiceTokenStatus
      responses:
        '200':
          description: Token status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewsTokenStatus'
              example:
                configured: true
                hasToken: true
                obtainedAt: 1739109600000
                softExpireAt: 1739628000000
                hardExpireAt: 1739714400000
                refreshFailures: 0
                lastRefreshReason: forced
                refreshedBy: manual-api
                msToSoftExpire: 3600000
                msToHardExpire: 7200000
                likelyExpired: false
        '500':
          description: Failed to read token status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/news/token:
    post:
      tags:
        - News
      summary: Set FinancialJuice token manually
      description: Sets token for FinancialJuice API and optional TTL values.
      operationId: setFinancialJuiceToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewsTokenSetRequest'
            example:
              token: 'REDACTED_FINANCIALJUICE_TOKEN'
              softTtlMinutes: 8640
              hardTtlMinutes: 10080
      responses:
        '200':
          description: Updated token status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewsTokenStatus'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Failed to set token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags:
        - News
      summary: Clear FinancialJuice token
      description: Removes saved token from local token store.
      operationId: clearFinancialJuiceToken
      responses:
        '200':
          description: Token cleared
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NewsTokenClearResponse'
              example:
                cleared: true
        '500':
          description: Failed to clear token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    EnrichedMover:
      type: object
      description: Market mover enriched with value metrics and money flow data
      properties:
        symbol:
          type: string
          description: Stock ticker symbol
          example: AAPL
        name:
          type: string
          description: Company name
          example: Apple Inc.
        price:
