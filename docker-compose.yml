services:
  stock-scanner:
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    build: .
    image: ghcr.io/flying3615/stock-scanner-standalone:latest
    container_name: stock-scanner
    restart: unless-stopped
    expose:
      - "3000"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=file:/app/data/dev.db
      - TIGER_ADAPTER_URL=http://tiger-adapter:8000
      - TIGER_ADAPTER_TOKEN=${TIGER_ADAPTER_TOKEN:-}
      - AUTO_CREDIT_SPREAD_AUTOMATION_ENABLED=${AUTO_CREDIT_SPREAD_AUTOMATION_ENABLED:-false}
      - AUTO_CREDIT_SPREAD_PAPER_ONLY=${AUTO_CREDIT_SPREAD_PAPER_ONLY:-true}
      - AUTO_CREDIT_SPREAD_MAX_RISK_PCT_PER_TRADE=${AUTO_CREDIT_SPREAD_MAX_RISK_PCT_PER_TRADE:-0.02}
      - AUTO_CREDIT_SPREAD_MAX_PORTFOLIO_RISK_PCT=${AUTO_CREDIT_SPREAD_MAX_PORTFOLIO_RISK_PCT:-0.10}
      - AUTO_CREDIT_SPREAD_COOLDOWN_MINUTES=${AUTO_CREDIT_SPREAD_COOLDOWN_MINUTES:-60}
    depends_on:
      tiger-adapter:
        condition: service_healthy
        required: false
    networks:
      - proxy-net
      - internal-net

  tiger-adapter:
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    image: ghcr.io/flying3615/tiger_adapter:latest
    container_name: tiger-adapter
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      - TIGER_OPEN_API_KEY=${TIGER_OPEN_API_KEY:-}
      - TIGER_OPEN_API_SECRET=${TIGER_OPEN_API_SECRET:-}
      - TIGER_OPEN_API_PASS=${TIGER_OPEN_API_PASS:-}
      - TIGER_ADAPTER_TOKEN=${TIGER_ADAPTER_TOKEN:-}
    volumes:
      - tiger-logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - internal-net

networks:
  proxy-net:
    external: true
    name: proxy-net
  internal-net:
    driver: bridge

volumes:
  tiger-logs:
